<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Bubbles Wish - Live</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #100a26 0%, #050212 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow-y: auto;
            overflow-x: hidden;
            padding-top: 30px;
            padding-bottom: 140px;
            position: relative;
        }

        /* Efek bintang luar angkasa */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        /* Container Utama - Flexbox rapi & anti tumpuk */
        .bubbles-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 1;
        }

        /* Styling Bubble Glossy */
        .bubble {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 28px;
            color: #ffffff;
            backdrop-filter: blur(3px);
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 20px 30px rgba(255, 255, 255, 0.2),
                inset 10px 0 30px rgba(0, 0, 0, 0.3),
                inset -10px 0 30px rgba(0, 0, 0, 0.3);
            animation: spawn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, float 6s ease-in-out infinite alternate;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            overflow: hidden;
        }

        .bubble:hover {
            transform: scale(1.1) !important;
            z-index: 10;
        }

        .bubble::after {
            content: "";
            position: absolute;
            top: 6%;
            left: 22%;
            width: 55%;
            height: 18%;
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0));
            border-radius: 50%;
            transform: rotate(-8deg);
            pointer-events: none;
        }

        .bubble-text {
            font-weight: 500;
            margin-bottom: 6px;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .bubble-name {
            font-size: 11px;
            opacity: 0.8;
            font-style: italic;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Panel Kontrol bawah */
        .footer-form-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(5, 2, 18, 0.98) 25%);
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .form-container {
            max-width: 800px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Tombol Trigger Emoji */
        .emoji-trigger-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .emoji-trigger-btn:hover {
            background: rgba(100, 43, 242, 0.3);
            border-color: #642bf2;
            transform: scale(1.05);
        }

        /* Popover Grid 3x5 */
        .emoji-popover {
            position: absolute;
            bottom: 64px;
            left: 0;
            background: rgba(18, 12, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.8);
            display: none;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            z-index: 110;
            animation: popUp 0.2s ease-out;
        }

        .emoji-popover.active {
            display: grid;
        }

        .emoji-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 22px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            text-align: center;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-item:hover {
            background: #642bf2;
            transform: scale(1.15);
        }

        /* Wrapper Input Form */
        .input-fields-wrapper {
            flex: 1;
            background: rgba(15, 10, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            gap: 10px;
        }

        .input-box {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            flex: 2;
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .name-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            padding: 10px 15px;
            border-radius: 20px;
            flex: 1;
            max-width: 130px;
        }

        .name-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            background: #642bf2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(100, 43, 242, 0.4);
        }

        .send-btn:hover {
            background: #7a46f7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 43, 242, 0.6);
        }

        /* Pop-up detail modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 2, 18, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease forwards;
        }

        .modal-content {
            background: #161036;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            transform: scale(0.8);
            animation: scaleUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-name {
            font-size: 14px;
            color: #b3a4f7;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 26px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #fff;
        }

        .hint-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Keyframes */
        @keyframes spawn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(10px) rotate(-1deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }

        @keyframes popUp {
            from { transform: translateY(10px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bubbles-container" id="bubblesContainer"></div>

    <div class="footer-form-panel">
        <span class="hint-text">💡 Klik bubble mana saja untuk membaca versi lengkapnya</span>
        
        <div class="form-container">
            <button class="emoji-trigger-btn" id="emojiTrigger" onclick="toggleEmojiPopover(event)">😊</button>
            
            <div class="emoji-popover" id="emojiPopover" onclick="event.stopPropagation()">
                <div class="emoji-item" onclick="insertEmoji('😊')">😊</div>
                <div class="emoji-item" onclick="insertEmoji('✨')">✨</div>
                <div class="emoji-item" onclick="insertEmoji('😭')">😭</div>
                <div class="emoji-item" onclick="insertEmoji('❤️')">❤️</div>
                <div class="emoji-item" onclick="insertEmoji('🚀')">🚀</div>
                <div class="emoji-item" onclick="insertEmoji('🥳')">🥳</div>
                <div class="emoji-item" onclick="insertEmoji('🥺')">🥺</div>
                <div class="emoji-item" onclick="insertEmoji('👍')">👍</div>
                <div class="emoji-item" onclick="insertEmoji('👏')">👏</div>
                <div class="emoji-item" onclick="insertEmoji('🎉')">🎉</div>
                <div class="emoji-item" onclick="insertEmoji('⭐')">⭐</div>
                <div class="emoji-item" onclick="insertEmoji('🙌')">🙌</div>
                <div class="emoji-item" onclick="insertEmoji('🔥')">🔥</div>
                <div class="emoji-item" onclick="insertEmoji('😂')">😂</div>
                <div class="emoji-item" onclick="insertEmoji('🤣')">🤣</div>
            </div>

            <div class="input-fields-wrapper">
                <input type="text" class="input-box" id="wishInput" placeholder="Tulis ucapanmu di sini..." required>
                <input type="text" class="name-box" id="nameInput" placeholder="Nama kamu" required>
                <button class="send-btn" onclick="addBubble()">
                    Kirim 
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-name" id="modalName"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwwunkJ6Ox1zKnEaPmuVz81LbeKLHnx1U",
            authDomain: "kogus-7176c.firebaseapp.com",
            databaseURL: "https://kogus-7176c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kogus-7176c",
            storageBucket: "kogus-7176c.firebasestorage.app",
            messagingSenderId: "955231066272",
            appId: "1:955231066272:web:2f1a9fe038c7c1249411c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'wishes');

        const neonColors = [
            { r: 236, g: 72, b: 153 },  // Pink
            { r: 59, g: 130, b: 246 },  // Blue
            { r: 168, g: 85, b: 247 },  // Purple
            { r: 34, g: 197, b: 94 },   // Green
            { r: 234, g: 179, b: 8 },   // Yellow
            { r: 6, g: 182, b: 212 }    // Cyan
        ];

        const container = document.getElementById('bubblesContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalText = document.getElementById('modalText');
        const modalName = document.getElementById('modalName');
        const popover = document.getElementById('emojiPopover');

        // Buka Tutup Panel Emoji
        window.toggleEmojiPopover = function(e) {
            e.stopPropagation();
            popover.classList.toggle('active');
        }

        // Klik di luar panel buat nutup panel emoji
        document.addEventListener('click', () => {
            popover.classList.remove('active');
        });

        // Insert Emoji berkali-kali tanpa nutup otomatis
        window.insertEmoji = function(emoji) {
            const wishInput = document.getElementById('wishInput');
            wishInput.value += emoji;
            wishInput.focus();
        }

        // Mengunci warna random berdasarkan text agar tidak berubah pas di-refresh
        function getColorFromString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % neonColors.length;
            return neonColors[index];
        }

        function createBubbleElement(text, name) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const size = Math.floor(Math.random() * 100) + 140;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            let fontSize = 13;
            if (text.length > 60) fontSize = 11;
            if (text.length > 100) fontSize = 10;
            bubble.style.fontSize = `${fontSize}px`;

            const color = getColorFromString(text + name);
            
            bubble.style.background = `rgba(${color.r}, ${color.g}, ${color.b}, 0.15)`;
            bubble.style.border = `2px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`;
            bubble.style.boxShadow = `
                inset 0 20px 30px rgba(255, 255, 255, 0.15),
                inset 10px 0 30px rgba(0, 0, 0, 0.2),
                0 0 25px rgba(${color.r}, ${color.g}, ${color.b}, 0.4)
            `;

            const floatDuration = (Math.random() * 3 + 5).toFixed(1); 
            const floatDelay = (Math.random() * -5).toFixed(1); 
            bubble.style.animationDelay = `0s, ${floatDelay}s`;
            bubble.style.animationDuration = `0.6s, ${floatDuration}s`;

            bubble.innerHTML = `
                <div class="bubble-text"></div>
                <div class="bubble-name"></div>
            `;
            
            bubble.querySelector('.bubble-text').textContent = text;
            bubble.querySelector('.bubble-name').textContent = `— ${name}`;

            bubble.addEventListener('click', () => {
                openModal(text, name, color);
            });

            return bubble;
        }

        function openModal(text, name, color) {
            modalText.textContent = text;
            modalName.textContent = `— ${name}`;
            
            const contentBox = modalOverlay.querySelector('.modal-content');
            contentBox.style.border = `2px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
            contentBox.style.boxShadow = `0 15px 50px rgba(0,0,0,0.5), 0 0 30px rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`;
            
            modalOverlay.style.display = 'flex';
        }

        window.closeModal = function() {
            modalOverlay.style.display = 'none';
        }

        window.addBubble = function() {
            const wishInput = document.getElementById('wishInput');
            const nameInput = document.getElementById('nameInput');

            if (!wishInput.value.trim() || !nameInput.value.trim()) {
                alert("Tolong isi ucapan dan nama kamu dulu ya!");
                return;
            }

            push(dbRef, {
                text: wishInput.value,
                name: nameInput.value,
                timestamp: Date.now()
            }).then(() => {
                wishInput.value = '';
                nameInput.value = '';
            }).catch((error) => {
                alert("Gagal mengirim ucapan: " + error.message);
            });
        }

        onChildAdded(dbRef, (snapshot) => {
            const data = snapshot.val();
            const newBubble = createBubbleElement(data.text, data.name);
            container.insertBefore(newBubble, container.firstChild);
        });
    </script>
</body>
</html>
