<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Bubbles Wish - Live</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #100a26 0%, #050212 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            padding-top: 40px;
            padding-bottom: 180px;
            position: relative;
        }

        /* Efek bintang luar angkasa */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        /* Container Utama */
        .bubbles-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            z-index: 1;
        }

        /* Styling Bubble Glossy */
        .bubble {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 25px;
            color: #ffffff;
            font-size: 13px;
            line-height: 1.4;
            backdrop-filter: blur(2px);
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 20px 30px rgba(255, 255, 255, 0.2),
                inset 10px 0 30px rgba(0, 0, 0, 0.3),
                inset -10px 0 30px rgba(0, 0, 0, 0.3);
            animation: spawn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, float 6s ease-in-out infinite alternate;
            word-break: break-word;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .bubble:hover {
            transform: scale(1.05) !important;
            z-index: 10;
        }

        /* Efek Kilau Atas Bubble */
        .bubble::after {
            content: "";
            position: absolute;
            top: 5%;
            left: 20%;
            width: 60%;
            height: 20%;
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0));
            border-radius: 50%;
            transform: rotate(-5deg);
            pointer-events: none;
        }

        .bubble-text {
            font-weight: 500;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 4; /* Potong text biar rapi di gelembung */
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .bubble-name {
            font-size: 11px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Panel Kontrol & Form di Bawah */
        .footer-form-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(5, 2, 18, 0.98) 25%);
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        /* Deretan Pilihan Emoji */
        .emoji-bar {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 800px;
            width: 100%;
            justify-content: center;
            overflow-x: auto;
        }

        .emoji-select {
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .emoji-select:hover {
            transform: scale(1.3);
        }

        /* Bar Input Teks & Nama */
        .form-container {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 10, 35, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            gap: 10px;
        }

        .input-box {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            flex: 2;
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .name-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            padding: 10px 15px;
            border-radius: 20px;
            flex: 1;
            max-width: 150px;
        }

        .name-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            background: #642bf2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(100, 43, 242, 0.4);
        }

        .send-btn:hover {
            background: #7a46f7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 43, 242, 0.6);
        }

        /* --- POP-UP MODAL DETAIL (SAAT BUBBLE DIKLIK) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 2, 18, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #161036;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            transform: scale(0.8);
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .modal-name {
            font-size: 14px;
            color: #b3a4f7;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 24px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #fff;
        }

        .hint-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes spawn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1.5deg); }
            100% { transform: translateY(12px) rotate(-1.5deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bubbles-container" id="bubblesContainer"></div>

    <div class="footer-form-panel">
        <span class="hint-text">💡 Klik bubble mana saja untuk membaca versi lengkapnya</span>
        
        <div class="emoji-bar">
            <span class="emoji-select" onclick="insertEmoji('😊')">😊</span>
            <span class="emoji-select" onclick="insertEmoji('✨')">✨</span>
            <span class="emoji-select" onclick="insertEmoji('😭')">😭</span>
            <span class="emoji-select" onclick="insertEmoji('❤️')">❤️</span>
            <span class="emoji-select" onclick="insertEmoji('🚀')">🚀</span>
            <span class="emoji-select" onclick="insertEmoji('🥳')">🥳</span>
            <span class="emoji-select" onclick="insertEmoji('🥺')">🥺</span>
            <span class="emoji-select" onclick="insertEmoji('👍')">👍</span>
            <span class="emoji-select" onclick="insertEmoji('👏')">👏</span>
            <span class="emoji-select" onclick="insertEmoji('🎉')">🎉</span>
            <span class="emoji-select" onclick="insertEmoji('⭐')">⭐</span>
            <span class="emoji-select" onclick="insertEmoji('🙌')">🙌</span>
            <span class="emoji-select" onclick="insertEmoji('🔥')">🔥</span>
            <span class="emoji-select" onclick="insertEmoji('😂')">😂</span>
        </div>

        <div class="form-container">
            <input type="text" class="input-box" id="wishInput" placeholder="Tulis ucapanmu di sini..." required>
            <input type="text" class="name-box" id="nameInput" placeholder="Nama kamu" required>
            <button class="send-btn" onclick="addBubble()">
                Kirim 
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-name" id="modalName"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config Asli dari Akunmu
        const firebaseConfig = {
            apiKey: "AIzaSyDwwunkJ6Ox1zKnEaPmuVz81LbeKLHnx1U",
            authDomain: "kogus-7176c.firebaseapp.com",
            databaseURL: "https://kogus-7176c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kogus-7176c",
            storageBucket: "kogus-7176c.firebasestorage.app",
            messagingSenderId: "955231066272",
            appId: "1:955231066272:web:2f1a9fe038c7c1249411c5"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'wishes');

        const neonColors = [
            { r: 236, g: 72, b: 153 },  // Pink
            { r: 59, g: 130, b: 246 },  // Blue
            { r: 168, g: 85, b: 247 },  // Purple
            { r: 34, g: 197, b: 94 },   // Green
            { r: 234, g: 179, b: 8 },   // Yellow
            { r: 6, g: 182, b: 212 }    // Cyan
        ];

        const container = document.getElementById('bubblesContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalText = document.getElementById('modalText');
        const modalName = document.getElementById('modalName');

        window.insertEmoji = function(emoji) {
            const wishInput = document.getElementById('wishInput');
            wishInput.value += emoji;
            wishInput.focus();
        }

        function createBubbleElement(text, name) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // Ukuran acak gelembung (130px sampai 230px)
            const size = Math.floor(Math.random() * 100) + 130;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            const color = neonColors[Math.floor(Math.random() * neonColors.length)];
            
            bubble.style.background = `rgba(${color.r}, ${color.g}, ${color.b}, 0.15)`;
            bubble.style.border = `2px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`;
            bubble.style.boxShadow = `
                inset 0 20px 30px rgba(255, 255, 255, 0.15),
                inset 10px 0 30px rgba(0, 0, 0, 0.2),
                0 0 25px rgba(${color.r}, ${color.g}, ${color.b}, 0.4)
            `;

            const floatDuration = (Math.random() * 3 + 5).toFixed(1); 
            const floatDelay = (Math.random() * -5).toFixed(1); 
            bubble.style.animationDelay = `0s, ${floatDelay}s`;
            bubble.style.animationDuration = `0.6s, ${floatDuration}s`;

            bubble.innerHTML = `
                <div class="bubble-text"></div>
                <div class="bubble-name"></div>
            `;
            
            // Menggunakan textContent agar aman dari XSS script hack
            bubble.querySelector('.bubble-text').textContent = text;
            bubble.querySelector('.bubble-name').textContent = `— ${name}`;

            bubble.addEventListener('click', () => {
                openModal(text, name, color);
            });

            return bubble;
        }

        function openModal(text, name, color) {
            modalText.textContent = text;
            modalName.textContent = `— dikirim oleh ${name}`;
            
            const contentBox = modalOverlay.querySelector('.modal-content');
            contentBox.style.border = `2px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
            contentBox.style.boxShadow = `0 15px 50px rgba(0,0,0,0.5), 0 0 30px rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`;
            
            modalOverlay.style.display = 'flex';
        }

        window.closeModal = function() {
            modalOverlay.style.display = 'none';
        }

        // Kirim data ke Firebase Online
        window.addBubble = function() {
            const wishInput = document.getElementById('wishInput');
            const nameInput = document.getElementById('nameInput');

            if (!wishInput.value.trim() || !nameInput.value.trim()) {
                alert("Tolong isi ucapan dan nama kamu dulu ya!");
                return;
            }

            push(dbRef, {
                text: wishInput.value,
                name: nameInput.value,
                timestamp: Date.now()
            }).then(() => {
                wishInput.value = '';
                nameInput.value = '';
            }).catch((error) => {
                alert("Gagal mengirim ucapan: " + error.message);
            });
        }

        // Dengarkan perubahan data di Firebase (Realtime sync)
        onChildAdded(dbRef, (snapshot) => {
            const data = snapshot.val();
            const newBubble = createBubbleElement(data.text, data.name);
            
            // Selalu taruh gelembung baru paling depan atas
            container.insertBefore(newBubble, container.firstChild);
        });
    </script>
</body>
</html>
