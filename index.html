<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Message Box ✨</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            --bubble-color: rgba(255, 255, 255, 0.15);
            --bubble-border: rgba(255, 255, 255, 0.3);
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- NAVIGATION BUTTONS --- */
        .nav-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .btn-nav {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-nav.active, .btn-nav:hover {
            background: #fff;
            color: #1e1b4b;
            transform: scale(1.05);
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* --- SCREEN 1: FORM INPUT --- */
        #screen-form {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 5;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .form-card h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .form-card p {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        /* --- SCREEN 2: BUBBLES FIELD --- */
        #screen-bubbles {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .bubble-instruction {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            backdrop-filter: blur(2px);
            z-index: 2;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- BUBBLE ELEMENTS --- */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 70%);
            border: 1px solid var(--bubble-border);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            animation: floatUp linear infinite;
        }

        .bubble:hover {
            transform: scale(1.15);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35) 0%, rgba(168, 85, 247, 0.2) 70%);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .bubble-sender {
            font-size: 11px;
            font-weight: bold;
            color: #f1f5f9;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            max-width: 90%;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) translateX(0);
            }
            50% {
                transform: translateY(50vh) translateX(20px);
            }
            100% {
                transform: translateY(-15vh) translateX(-10px);
            }
        }

        /* --- MODAL POPUP (UNTUK LIHAT PESAN) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1b4b, #311042);
            padding: 35px;
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(236, 72, 153, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .modal-sender {
            font-size: 14px;
            font-weight: bold;
            color: #ec4899;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-close:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- Tombol Navigasi Halaman -->
    <div class="nav-container">
        <button class="btn-nav active" onclick="switchScreen('form')">✍️ Tulis Ucapan</button>
        <button class="btn-nav" onclick="switchScreen('bubbles')">🎈 Lihat Bubbles</button>
    </div>

    <!-- HALAMAN 1: FORM ISIAN -->
    <div id="screen-form" class="screen active">
        <div class="form-card">
            <h2>Farewell Box For Someone Special ❤️</h2>
            <p>Tulis pesan terbaikmu di sini. Kamu boleh kirim lebih dari satu kali kok! Biar gelembungnya makin rame.</p>
            
            <form id="messageForm" onsubmit="saveMessage(event)">
                <div class="form-group">
                    <label for="senderName">Nama Kamu:</label>
                    <input type="text" id="senderName" placeholder="Contoh: Njel / Bebi / Anonim" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="messageText">Pesan / Ucapan:</label>
                    <textarea id="messageText" rows="5" placeholder="Tulis semua kenangan manis, doa, atau lucunya kalian di sini..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Kirim ke Bubble Field ✨</button>
            </form>
        </div>
    </div>

    <!-- HALAMAN 2: BUBBLES FIELD -->
    <div id="screen-bubbles" class="screen">
        <div class="bubble-instruction">Klik salah satu bubble untuk baca pesannya 🤫</div>
        <!-- Bubbles akan di-generate otomatis di sini pakai JS -->
    </div>

    <!-- MODAL POPUP UNTUK LIHAT DETAIL PESAN -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="btn-close" onclick="closeModal()">✕</button>
            <p class="modal-text" id="modalText">Isi ucapan di sini...</p>
            <div class="modal-sender" id="modalSender">Dari: Seseorang</div>
        </div>
    </div>

    <script>
        // Ambil data ucapan dari localStorage atau buat array kosong kalau belum ada data
        let messages = JSON.parse(localStorage.getItem('farewellMessages')) || [];

        // Fungsi pindah halaman
        function switchScreen(screenType) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));

            if (screenType === 'form') {
                document.getElementById('screen-form').classList.add('active');
                document.querySelectorAll('.btn-nav')[0].classList.add('active');
            } else {
                document.getElementById('screen-bubbles').classList.add('active');
                document.querySelectorAll('.btn-nav')[1].classList.add('active');
                renderBubbles(); // Re-render bubbles biar posisi dan jumlahnya selalu update
            }
        }

        // Fungsi Simpan Ucapan
        function saveMessage(e) {
            e.preventDefault();
            const nameInput = document.getElementById('senderName');
            const textInput = document.getElementById('messageText');

            const newMessage = {
                id: Date.now(),
                sender: nameInput.value.trim(),
                text: textInput.value.trim()
            };

            messages.push(newMessage);
            localStorage.setItem('farewellMessages', JSON.stringify(messages));

            // Reset form input tapi nama dikasih tetep ada biar kalau mau input lagi gak repot ngetik nama
            textInput.value = '';
            
            alert('Ucapan kamu berhasil diterbangkan! 🎈 Silakan cek di tab "Lihat Bubbles".');
            switchScreen('bubbles');
        }

        // Fungsi buat gelembung melayang
        function renderBubbles() {
            const container = document.getElementById('screen-bubbles');
            
            // Bersihkan konten bubble lama kecuali instruksi teks di bawah
            const instruction = container.querySelector('.bubble-instruction');
            container.innerHTML = '';
            container.appendChild(instruction);

            if (messages.length === 0) {
                // Tampilan kalau gelembung masih kosong
                const emptyText = document.createElement('div');
                emptyText.style.position = 'absolute';
                emptyText.style.top = '50%';
                emptyText.style.left = '50%';
                emptyText.style.transform = 'translate(-50%, -50%)';
                emptyText.style.textAlign = 'center';
                emptyText.innerHTML = '<h3>Belum ada bubble nih. 🥺<br>Yuk, isi ucapan dulu di halaman sebelah!</h3>';
                container.appendChild(emptyText);
                return;
            }

            // Loop setiap data ucapan buat dijadiin bubble
            messages.forEach((msg) => {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');

                // Set ukuran bubble acak antara 80px sampai 140px biar dinamis dan lucu
                const size = Math.floor(Math.random() * 60) + 80;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;

                // Set posisi horizontal acak (0% - 90%)
                bubble.style.left = `${Math.random() * 90}%`;

                // Set durasi melayang acak biar gak barengan naiknya (8s - 18s)
                const duration = Math.random() * 10 + 8;
                bubble.style.animationDuration = `${duration}s`;

                // Set delay acak biar munculnya gantian
                bubble.style.animationDelay = `-${Math.random() * duration}s`;

                // Isi bubble pake inisial / nama pengirim singkat
                const senderLabel = document.createElement('span');
                senderLabel.classList.add('bubble-sender');
                senderLabel.innerText = msg.sender;
                bubble.appendChild(senderLabel);

                // Efek klik untuk buka isi ucapan lengkap
                bubble.addEventListener('click', () => {
                    openModal(msg.text, msg.sender);
                });

                container.appendChild(bubble);
            });
        }

        // Fungsi Buka Modal Detail Pesan
        function openModal(text, sender) {
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalSender').innerText = `Dari: ${sender}`;
            document.getElementById('modalOverlay').classList.add('active');
        }

        // Fungsi Tutup Modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
