<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Ko Gus✨</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            --bubble-border: rgba(255, 255, 255, 0.45);
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- NAVIGATION --- */
        .nav-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            display: flex;
            gap: 12px;
            width: max-content;
        }

        .btn-nav {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-nav.active, .btn-nav:hover {
            background: #fff;
            color: #1e1b4b;
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255,255,255,0.2);
        }

        /* --- SCREENS --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* --- FORM INPUT --- */
        #screen-form {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        .form-card h2 {
            margin-bottom: 8px;
            font-size: 26px;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #ec4899;
            box-shadow: 0 0 12px rgba(236, 72, 153, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        /* --- BUBBLES FIELD --- */
 #screen-bubbles{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.bubble{
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5;
}

        .bubble-instruction {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.7);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 13px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            z-index: 50;
            border: 1px solid rgba(255,255,255,0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- REALTIME STABLE FLOATING BUBBLE --- */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.03) 65%, rgba(236, 72, 153, 0.08) 100%);
            border: 1px solid var(--bubble-border);
            box-shadow: inset -4px -4px 12px rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.25);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            animation: gentleFloat 6s ease-in-out infinite alternate;
        }

        .bubble:hover {
            transform: scale(1.12) translateY(-5px) !important;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.45) 0%, rgba(168, 85, 247, 0.25) 70%);
            border-color: #a855f7;
            box-shadow: inset -4px -4px 12px rgba(0,0,0,0.15), 0 12px 25px rgba(168, 85, 247, 0.3);
        }

        .bubble-content {
            font-size: 11px;
            line-height: 1.3;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Potong teks maksimal 3 baris di dalam bulatannya */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            font-weight: 500;
            word-break: break-word;
            padding: 2px;
        }

        @keyframes gentleFloat {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) translateX(10px) rotate(2deg);
            }
            100% {
                transform: translateY(5px) translateX(-10px) rotate(-2deg);
            }
        }

        /* --- MODAL POPUP --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1b4b, #311042);
            padding: 35px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(236, 72, 153, 0.4);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #f1f5f9;
        }

        .modal-sender {
            font-size: 13px;
            font-weight: 700;
            color: #ec4899;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-close:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="btn-nav active" onclick="switchScreen('form')">Kartu Ucapan</button>
        <button class="btn-nav" onclick="switchScreen('bubbles')">Halaman Bubbles</button>
    </div>

    <div id="screen-form" class="screen active">
        <div class="form-card">
            <h2>Farewell Ko Gus ❤️</h2>
            <p>Tulis pesan buat ko Gus. Nanti terbang ke Halaman Bubbles.</p>
            
            <form id="messageForm" onsubmit="saveMessage(event)">
                <div class="form-group">
                    <label for="senderName">Nama Kamu:</label>
                    <input type="text" id="senderName" placeholder="Misal: Aaron" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="messageText">Pesan / Ucapan:</label>
                    <textarea id="messageText" rows="5" placeholder="Ketik ucapan bebas seberapa panjang di sini..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Terbangkan Bubble ✨</button>
            </form>
        </div>
    </div>

    <div id="screen-bubbles" class="screen">
        <div class="bubble-instruction">Klik bubble-nya untuk baca versi lengkapnya ya!</div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="btn-close" onclick="closeModal()">✕</button>
            <p class="modal-text" id="modalText">Isi ucapan...</p>
            <div class="modal-sender" id="modalSender">Dari: Seseorang</div>
        </div>
    </div>

    <script>
        // Mengambil memori ucapan yang tersimpan
        let messages = JSON.parse(localStorage.getItem('farewellMessages')) || [];

        function switchScreen(screenType) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none'; 
            });
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));

            if (screenType === 'form') {
                const formScreen = document.getElementById('screen-form');
                formScreen.style.display = 'flex';
                setTimeout(() => formScreen.classList.add('active'), 10);
                document.querySelectorAll('.btn-nav')[0].classList.add('active');
            } else {
                const bubbleScreen = document.getElementById('screen-bubbles');
                bubbleScreen.style.display = 'flex';
                setTimeout(() => bubbleScreen.classList.add('active'), 10);
                document.querySelectorAll('.btn-nav')[1].classList.add('active');
                renderBubbles(); 
            }
        }

        function saveMessage(e) {
            e.preventDefault();
            const nameInput = document.getElementById('senderName');
            const textInput = document.getElementById('messageText');

            const newMessage = {
                id: Date.now(),
                sender: nameInput.value.trim(),
                text: textInput.value.trim()
            };

            messages.push(newMessage);
            localStorage.setItem('farewellMessages', JSON.stringify(messages));

            textInput.value = ''; // Kosongkan kolom chat setelah kirim
            
            switchScreen('bubbles');
        }

       function renderBubbles() {

    const container = document.getElementById('screen-bubbles');

    // hapus bubble lama

    container.querySelectorAll('.bubble, .empty-text').forEach(el => el.remove());

    if (messages.length === 0) {

        const emptyText = document.createElement('div');

        emptyText.className = "empty-text";

        emptyText.style.position = 'absolute';

        emptyText.style.top = '50%';

        emptyText.style.left = '50%';

        emptyText.style.transform = 'translate(-50%,-50%)';

        emptyText.style.textAlign = 'center';

        emptyText.innerHTML = `

            <h3>Belum ada bubble 🥺</h3>

            <p>Tulis ucapan dulu ya.</p>

        `;

        container.appendChild(emptyText);

        return;

    }

    const width = container.clientWidth;

    const height = container.clientHeight;

    const placed = [];

    messages.forEach(msg => {

        const bubble = document.createElement('div');

        bubble.className = "bubble";

        const size = 110 + Math.random() * 35;

        bubble.style.width = size + "px";

        bubble.style.height = size + "px";

        // cari posisi yang tidak tabrakan

        let x, y, safe = false;

        for(let i=0;i<200;i++){

            x = Math.random() * (width - size - 40) + 20;

            y = Math.random() * (height - size - 120) + 70;

            safe = true;

            for(const p of placed){

                const dx = x - p.x;

                const dy = y - p.y;

                if(Math.sqrt(dx*dx+dy*dy) < (size+p.size)/2 + 20){

                    safe = false;

                    break;

                }

            }

            if(safe) break;

        }

        placed.push({x,y,size});

        bubble.style.left = x + "px";

        bubble.style.top = y + "px";

        bubble.style.animationDuration = (5 + Math.random()*4) + "s";

        bubble.style.animationDelay = "-" + (Math.random()*5) + "s";

        bubble.innerHTML = `

            <div class="bubble-content">

                ${msg.text}

            </div>

        `;

        bubble.onclick = () => openModal(msg.text, msg.sender);

        container.appendChild(bubble);

    });

}

        function openModal(text, sender) {
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalSender').innerText = `Dari: ${sender}`;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
