<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farewell Ko Gus - Live View</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #100a26 0%, #050212 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 10px 40px 10px; /* Padding bawah normal karena gak ada form */
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        /* Efek bintang luar angkasa */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        /* Container Utama */
        .bubbles-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 1;
        }

        /* Styling Bubble Glossy */
        .bubble {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 12px;
            color: #ffffff;
            backdrop-filter: blur(3px);
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 10px 20px rgba(255, 255, 255, 0.2),
                inset 5px 0 15px rgba(0, 0, 0, 0.3),
                inset -5px 0 15px rgba(0, 0, 0, 0.3);
            animation: spawn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, float 6s ease-in-out infinite alternate;
            transition: transform 0.2s;
            overflow: hidden;
            word-break: break-word;
        }

        .bubble:active {
            transform: scale(0.95) !important;
        }

        .bubble::after {
            content: "";
            position: absolute;
            top: 6%; left: 22%;
            width: 55%; height: 18%;
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0));
            border-radius: 50%;
            transform: rotate(-8deg);
            pointer-events: none;
        }

        .bubble-text {
            font-weight: 500;
            margin-bottom: 4px;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .bubble-name {
            font-size: 9px;
            opacity: 0.7;
            font-style: italic;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Pop-up modal detail saat balon diklik */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 2, 18, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal-content {
            background: #161036;
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: scale(0.9);
            animation: scaleUp 0.2s ease-out forwards;
        }

        .modal-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-name {
            font-size: 13px;
            color: #b3a4f7;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
        }

        /* Keyframes */
        @keyframes spawn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(0.5deg); }
            100% { transform: translateY(5px) rotate(-0.5deg); }
        }
        @keyframes scaleUp {
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bubbles-container" id="bubblesContainer"></div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-name" id="modalName"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwwunkJ6Ox1zKnEaPmuVz81LbeKLHnx1U",
            authDomain: "kogus-7176c.firebaseapp.com",
            databaseURL: "https://kogus-7176c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kogus-7176c",
            storageBucket: "kogus-7176c.firebasestorage.app",
            messagingSenderId: "955231066272",
            appId: "1:955231066272:web:2f1a9fe038c7c1249411c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'wishes');

        const neonColors = [
            { r: 236, g: 72, b: 153 },
            { r: 59, g: 130, b: 246 },
            { r: 168, g: 85, b: 247 },
            { r: 34, g: 197, b: 94 },
            { r: 234, g: 179, b: 8 },
            { r: 6, g: 182, b: 212 }
        ];

        const container = document.getElementById('bubblesContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalText = document.getElementById('modalText');
        const modalName = document.getElementById('modalName');

        function getColorFromString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % neonColors.length;
            return neonColors[index];
        }

        function createBubbleElement(id, text, name) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.setAttribute('data-id', id);

            const isMobile = window.innerWidth < 600;
            const size = isMobile ? (Math.floor(Math.random() * 30) + 90) : (Math.floor(Math.random() * 50) + 130);
            
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            let fontSize = isMobile ? 11 : 13;
            if (text.length > 50) fontSize = isMobile ? 9 : 11;
            bubble.style.fontSize = `${fontSize}px`;

            const color = getColorFromString(text + name);
            
            bubble.style.background = `rgba(${color.r}, ${color.g}, ${color.b}, 0.15)`;
            bubble.style.border = `1.5px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`;
            bubble.style.boxShadow = `
                inset 0 10px 15px rgba(255, 255, 255, 0.15),
                inset 5px 0 15px rgba(0, 0, 0, 0.2),
                0 0 15px rgba(${color.r}, ${color.g}, ${color.b}, 0.35)
            `;

            const floatDuration = (Math.random() * 3 + 5).toFixed(1); 
            const floatDelay = (Math.random() * -5).toFixed(1); 
            bubble.style.animationDelay = `0s, ${floatDelay}s`;
            bubble.style.animationDuration = `0.5s, ${floatDuration}s`;

            bubble.innerHTML = `
                <div class="bubble-text"></div>
                <div class="bubble-name"></div>
            `;
            
            bubble.querySelector('.bubble-text').textContent = text;
            bubble.querySelector('.bubble-name').textContent = `— ${name}`;

            bubble.addEventListener('click', () => {
                openModal(text, name, color);
            });

            return bubble;
        }

        function openModal(text, name, color) {
            modalText.textContent = text;
            modalName.textContent = `— dikirim oleh ${name}`;
            
            const contentBox = modalOverlay.querySelector('.modal-content');
            contentBox.style.border = `2px solid rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`;
            contentBox.style.boxShadow = `0 15px 40px rgba(0,0,0,0.6), 0 0 25px rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`;
            
            modalOverlay.style.display = 'flex';
        }

        window.closeModal = function() {
            modalOverlay.style.display = 'none';
        }

        // Listen data baru masuk secara live
        onChildAdded(dbRef, (snapshot) => {
            const id = snapshot.key;
            const data = snapshot.val();
            const newBubble = createBubbleElement(id, data.text, data.name);
            container.insertBefore(newBubble, container.firstChild);
        });

        // Listen jika ada data yang dihapus dari dashboard/HP pengirim
        onChildRemoved(dbRef, (snapshot) => {
            const targetId = snapshot.key;
            const elementToRemove = container.querySelector(`[data-id="${targetId}"]`);
            if (elementToRemove) {
                elementToRemove.style.transform = 'scale(0)';
                elementToRemove.style.opacity = '0';
                setTimeout(() => elementToRemove.remove(), 200);
            }
        });
    </script>
</body>
</html>
